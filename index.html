<!DOCTYPE html>
<html>
<head>
<title>Travel Story Chatbot</title>

<style>

body{
font-family: Arial;
background:#e3f2fd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat-container{
width:420px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.chat-header{
background:#1ebcf1;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.chat-box{
height:350px;
overflow-y:auto;
padding:10px;
}

.user{
color:#0d47a1;
}

.bot{
color:#1b5e20;
}

.input-area{
display:flex;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#0f08eb;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
}

button:hover{
background:#0000aa;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
🌍 Travel Story Chatbot
</div>

<div id="chat-box" class="chat-box"></div>

<div class="input-area">
<input type="text" id="userInput" placeholder="Ask about travel..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput").value;
let chatBox = document.getElementById("chat-box");

if(input.trim()=="") return;

chatBox.innerHTML += "<p class='user'><b>You:</b> "+input+"</p>";

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:input})
})
.then(res=>res.json())
.then(data=>{
chatBox.innerHTML += "<p class='bot'><b>Bot:</b> "+data.reply+"</p>";
chatBox.scrollTop = chatBox.scrollHeight;
});

document.getElementById("userInput").value="";

}

</script>

</body>
</html>
